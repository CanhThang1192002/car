# Car-web: SQL Server + ASP.NET Core API + Vite/React (nginx)
#
# Chạy: docker compose up --build
# Web: http://localhost:8080  |  API/Swagger: http://localhost:5239/swagger
#
# CSDL: áp migrations từ máy host (cần .NET SDK):
#   $env:MSSQL_SA_PASSWORD="..."   # trùng mật khẩu container nếu bạn đổi trong .env
#   dotnet ef database update -p be/OtoBackend/SqlServer -s be/OtoBackend/OtoBackend `
#     --connection "Server=localhost,1433;Database=oto;User Id=sa;Password=...;TrustServerCertificate=True;"
#
# Ghi đè mật khẩu SA: tạo file .env với dòng MSSQL_SA_PASSWORD=...

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-CarWeb2026Sql#}"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -b -o /dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s

  api:
    build:
      context: ./be/OtoBackend
      dockerfile: Dockerfile
    ports:
      - "5239:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=db;Database=oto;User Id=sa;Password=${MSSQL_SA_PASSWORD:-CarWeb2026Sql#};TrustServerCertificate=True;"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./fe
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5239
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  mssql_data:
